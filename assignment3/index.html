<!DOCTYPE html>
<html>
    <head>
        <title>Little Lemon</title>
        <link href="bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <script src="bootstrap.bundle.min.js"></script>
        <div class="container">
            <div class="row">
                <div class="col-4">
                    <div class="text-center">
                        <img src="logo.jpg" class="img-fluid">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-8">
                    <div class="text-center">
                        <h1>Our Menu</h1>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-12 col-lg-6">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Bruschetta <span class="badge bg-primary"></span></h5>
                            <p class="card-text">Grilled bread, garlic, tomatoes, olive oil.</p>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Falafel <span class="badge bg-primary"></span></h5>
                            <p class="card-text">Chickpea, herbs, spices.</p>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Fried Calamari <span class="badge bg-primary"></span></h5>
                            <p class="card-text">Squid, buttermilk.</p>
                        </div>

                    </div>
                </div>

                <div class="col-12 col-lg-6">
                    <h2>Pasta Salad <span class="badge bg-primary"></span></h2>
                    <p>Lettuce, vegetables, mozzarella.</p>
                    <h2>Greek Salad <span class="badge bg-primary">NEW</span></h2>
                    <p>Cucumbers, onion, feta cheese.</p>
                </div>
            </div>
        </div>
    </body>
</html>
